name: IoT Chas Advance CI Pipeline
on:
    push:
        branches:
            - main
            - develop
            - feature-**
    pull_request:
        branches:
            - main
            - develop

    workflow_dispatch:

jobs:
    pre-commit:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Python
              if: ${{ !env.ACT }} # skip when testing locally with act
              uses: actions/setup-python@v5
              with:
                  python-version: '3.11'

            - name: Cache pip
              uses: actions/cache@v4
              with:
                  path: ~/.cache/pip
                  key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}

            - name: Install pre-commit
              run: pip install pre-commit

            - name: Run pre-commit hooks on all files
              run: pre-commit run --all-files

    build:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                board: [uno_r4_wifi, esp32_broker]
                include:
                    - board: uno_r4_wifi
                      folder: Arduino
                    - board: esp32_broker
                      folder: S3
        steps:
            - name: Checkout repo
              uses: actions/checkout@v4

            - name: Cache dependencies
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cache/pip
                      ~/.platformio/.cache
                  key: ${{ runner.os }}-pio-${{ hashFiles('**/platformio.ini') }}

            - name: Setup python
              if: ${{ !env.ACT }} # skip when testing locally with act
              uses: actions/setup-python@v5
              with:
                  python-version: '3.11'

            - name: Install PlatformIO Core
              run: pip install --upgrade platformio

            - name: Build project (${{matrix.board}})
              run: |
                  cd ${{matrix.folder}}
                  pio run -e ${{matrix.board}}

    # Docker build
    docker:
        runs-on: ubuntu-latest
        needs: [pre-commit, build]
        strategy:
            matrix:
                board: [uno_r4_wifi, esp32_broker]
                include:
                    - board: uno_r4_wifi
                      folder: Arduino
                    - board: esp32_broker
                      folder: S3
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build Docker image
              run: docker build -t iot-chas-advance:ci .

            - name: Run PlatformIO inside Docker
              run: |
                  docker run --rm iot-chas-advance:ci bash -c "cd /workspace/${{matrix.folder}} && pio run -e ${{ matrix.board }}"

    cleanup:
        runs-on: ubuntu-latest
        needs: docker
        steps:
            - name: Checkout repo
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0 # important! ensures full history so we can amend

            - name: Delete secrets.h and amend last commit
              run: |
                  rm Arduino/include/secrets.h
                  rm S3/include/secrets.h
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add -u
                  git commit --amend --no-edit
                  git push --force
