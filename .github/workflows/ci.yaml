name: IoT Chas Advance CI Pipeline
on:
    push:
        branches:
            - main
            - develop
            - feature-**
    pull_request:
        branches:
            - main
            - develop

jobs:
    build:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                board: [uno_r4_wifi_ci, esp32_broker_ci]

        steps:
            - name: Checkout repo
              uses: actions/checkout@v4

            - name: Cache dependencies
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cache/pip
                      ~/.platformio/.cache
                  key: ${{ runner.os }}-pio-${{ hashFiles('**/platformio.ini') }}

            - name: Setup python
              if: ${{ !env.ACT }} # skip when testing locally with act
              uses: actions/setup-python@v5
              with:
                  python-version: '3.11'

            - name: Install PlatformIO Core
              run: pip install --upgrade platformio

            - name: Build project (${{matrix.board}})
              run: |
                  if [[ "${{matrix.board}}" == "uno_r4_wifi_ci" ]]; then
                    cd Arduino && pio run -e uno_r4_wifi_ci
                  else
                    cd S3 && pio run -e esp32_broker_ci
                  fi

    # Docker build
    docker:
        runs-on: ubuntu-latest
        needs: [build]
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build Docker image
              run: docker build -t iot-chas-advance:ci .

            - name: Run PlatformIO inside Docker
              run: |
                  docker run --rm -v ${{ github.workspace }}:/workspace iot-chas-advance:ci \
                  bash -c "cd Arduino && pio run -e uno_r4_wifi && pio check -e uno_r4_wifi --fail-on-defect=medium --skip-packages"
                  docker run --rm -v ${{ github.workspace }}:/workspace iot-chas-advance:ci \
                  bash -c "cd S3 && pio run -e esp32_broker && pio check -e esp32_broker --fail-on-defect=medium --skip-packages"
