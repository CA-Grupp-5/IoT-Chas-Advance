repos:
    - repo: https://github.com/pre-commit/mirrors-clang-format
      rev: v18.1.2
      hooks:
          - id: clang-format
            name: clang-format (project style)
            args: ['-style=file']
            files: \.(c|h|cpp|hpp)$

    - repo: local
      hooks:
          - id: platformio-check-arduino
            name: PlatformIO check (Arduino)
            entry: bash -c "cd Arduino && pio run -e uno_r4_wifi && pio check -e uno_r4_wifi --fail-on-defect=high --fail-on-defect=medium --skip-packages"
            language: python
            additional_dependencies:
                - platformio
            pass_filenames: false

          - id: platformio-check-s3
            name: PlatformIO check (S3)
            entry: bash -c "cd S3 && pio run -e esp32_broker && pio check -e esp32_broker --fail-on-defect=high --fail-on-defect=medium --skip-packages"
            language: python
            additional_dependencies:
                - platformio
            pass_filenames: false

    - repo: https://github.com/pre-commit/pre-commit-hooks
      rev: v6.0.0
      hooks:
          - id: check-yaml
          - id: check-json
            exclude: '\.vscode/extensions\.json$'
