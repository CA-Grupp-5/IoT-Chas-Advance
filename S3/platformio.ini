[env:esp32_broker]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
board_upload.flash_size = 4MB
board_build.partitions = default.csv
monitor_speed = 115200
monitor_dtr = 0
monitor_rts = 0
upload_port = COM8
monitor_port = COM8
build_flags =
  -Iinclude -std=c++11
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DBOARD_HAS_PSRAM

[env:esp32_broker_ci]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
build_flags = -DUNIT_TEST
  -Wparentheses
  -Wall
  -Wextra
  -Werror
  -Winit-self
  -Wformat-security
  -Wunreachable-code
  -Wduplicated-cond
  -Wduplicated-branches
